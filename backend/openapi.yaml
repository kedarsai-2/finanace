openapi: 3.0.3
info:
  title: Glow Business Board API
  version: 1.0.0
  description: API documentation for authentication, masters, sales, purchases, payments, accounts, and reports helpers.
servers:
  - url: http://localhost:8080
    description: Local backend
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Ok:
      description: Success
    Created:
      description: Created
    NoContent:
      description: No content
    BadRequest:
      description: Bad request
    Unauthorized:
      description: Unauthorized
    NotFound:
      description: Not found
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Businesses
  - name: Parties
  - name: Items
  - name: Accounts
  - name: Transfers
  - name: Payments
  - name: Invoices
  - name: Purchases
  - name: Expenses
  - name: Expense Categories
  - name: Utilities
paths:
  /api/authenticate:
    post:
      tags: [Auth]
      summary: Authenticate user
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/register:
    post:
      tags: [Auth]
      summary: Register user
      security: []
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/businesses:
    get:
      tags: [Businesses]
      summary: List businesses
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    post:
      tags: [Businesses]
      summary: Create business
      responses:
        '201': { $ref: '#/components/responses/Created' }
  /api/businesses/{id}:
    put:
      tags: [Businesses]
      summary: Update business
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    delete:
      tags: [Businesses]
      summary: Delete business
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { $ref: '#/components/responses/NoContent' }

  /api/parties:
    get:
      tags: [Parties]
      summary: List parties
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    post:
      tags: [Parties]
      summary: Create party
      responses:
        '201': { $ref: '#/components/responses/Created' }
  /api/parties/{id}:
    put:
      tags: [Parties]
      summary: Update party
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    delete:
      tags: [Parties]
      summary: Delete party
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { $ref: '#/components/responses/NoContent' }

  /api/items:
    get:
      tags: [Items]
      summary: List items/assets
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    post:
      tags: [Items]
      summary: Create item/asset
      responses:
        '201': { $ref: '#/components/responses/Created' }
  /api/items/{id}:
    put:
      tags: [Items]
      summary: Update item/asset
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    patch:
      tags: [Items]
      summary: Patch item/asset
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    delete:
      tags: [Items]
      summary: Delete item/asset
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { $ref: '#/components/responses/NoContent' }

  /api/accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      responses:
        '200': { $ref: '#/components/responses/Ok' }
    post:
      tags: [Accounts]
      summary: Create account
      responses:
