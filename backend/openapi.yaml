components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Id:
      type: integer
      format: int64
    DateTime:
      type: string
      format: date-time
    AnyObject:
      type: object
      additionalProperties: true
    AnyArray:
      type: array
      items:
        $ref: '#/components/schemas/AnyObject'
    Business:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        name: { type: string }
        currency: { type: string }
        state: { type: string }
    Party:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        name: { type: string }
        mobile: { type: string }
        email: { type: string }
        state: { type: string }
        gstNumber: { type: string }
    Item:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        name: { type: string }
        type: { type: string, enum: [PRODUCT, SERVICE] }
        sellingPrice: { type: number }
        purchasePrice: { type: number }
        taxPercent: { type: number }
        unit: { type: string }
        active: { type: boolean }
    Account:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        name: { type: string }
        type: { type: string, enum: [CASH, BANK, UPI] }
        openingBalance: { type: number }
        accountNumber: { type: string }
        ifsc: { type: string }
        upiId: { type: string }
        notes: { type: string }
    Payment:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        date: { $ref: '#/components/schemas/DateTime' }
        amount: { type: number }
        mode: { type: string, enum: [CASH, BANK, UPI] }
        reference: { type: string }
        notes: { type: string }
    Transfer:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        date: { $ref: '#/components/schemas/DateTime' }
        transferKind: { type: string, enum: [TRANSFER, ADJUSTMENT] }
        adjustmentDirection: { type: string, enum: [INCREMENT, DECREMENT] }
        amount: { type: number }
        notes: { type: string }
    Invoice:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        number: { type: string }
        date: { $ref: '#/components/schemas/DateTime' }
        total: { type: number }
        paidAmount: { type: number }
        status: { type: string }
    Purchase:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        number: { type: string }
        date: { $ref: '#/components/schemas/DateTime' }
        total: { type: number }
        paidAmount: { type: number }
        status: { type: string }
    Expense:
      type: object
      properties:
        id: { $ref: '#/components/schemas/Id' }
        date: { $ref: '#/components/schemas/DateTime' }
        amount: { type: number }
        category: { type: string }
        notes: { type: string }
